<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoftwareFreeMp3</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>

    <header>
        <div class="brand">Software<span>FreeMp3</span></div>
    </header>

    <div class="tabs">
        <button class="tab active" data-tab="video">Video</button>
        <button class="tab" data-tab="playlist">Lista de reproducción</button>
    </div>

    <main class="container">

        <!-- VIDEO -->
        <section class="tab-content active" id="video">

            <div class="intro">
                <h1>Descargar audio de YouTube</h1>
                <p>Pegá el enlace del video y obtené el MP3.</p>
            </div>

            <form class="form-group downloadForm" data-playlist="false">

                <div class="field">
                    <label>URL del video</label>
                    <input
                        type="text"
                        class="urlInput"
                        placeholder="https://www.youtube.com/watch?v=..."
                        required
                    >
                </div>

                <button type="submit" class="startBtn">
                    Descargar MP3
                </button>

                <div class="progress-line"></div>

                <div class="result">

                    <div class="status-badge">
                        <span class="status-dot"></span>
                        <span class="status-text"></span>
                    </div>

                    <div class="log-container"></div>

                </div>

            </form>

        </section>

        <!-- PLAYLIST -->
        <section class="tab-content" id="playlist">

            <div class="intro">
                <h1>Descargar lista de reproducción</h1>
                <p>Pegá el enlace de una playlist de YouTube.</p>
            </div>

            <form class="form-group downloadForm" data-playlist="true">

                <!-- Agrupador de campos para mantener el orden visual -->
                <div class="form-fields">
                    <div class="field field-url">
                        <label>URL de la playlist</label>
                        <input
                            type="text"
                            class="urlInput"
                            placeholder="https://www.youtube.com/playlist?list=..."
                            required
                        >
                    </div>

                    <div class="field field-limit">
                        <label>Límite de videos</label>
                        <input
                            type="number"
                            class="limitInput"
                            placeholder="10"
                            min="1"
                            max="200"
                            value="10"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="startBtn">
                    Descargar Playlist
                </button>

                <div class="progress-line"></div>

                <div class="result">
                    <div class="status-badge">
                        <span class="status-dot"></span>
                        <span class="status-text"></span>
                    </div>
                    <div class="log-container"></div>
                </div>

            </form>

        </section>

    </main>

    <script src="/js/index.js"></script>
</body>
</html>
